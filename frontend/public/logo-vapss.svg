<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90" fill="none">
  <!--
    Logo V.A.P. Servicios Sanitarios — Modern redesign
    Heartbeat pulse + V.A.P. text + tagline
    Colors: Red #DC2626, Navy #1E2A4A, Gray #9CA3AF
  -->
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#DC2626" stop-opacity="1"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- ===== ECG / Heartbeat pulse line ===== -->
  <!-- Main red pulse -->
  <polyline
    points="
      0,44
      45,44
      55,44
      63,28
      71,62
      79,16
      87,58
      95,36
      103,44
      140,44
    "
    stroke="url(#pulseGrad)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Blue shadow (depth) -->
  <polyline
    points="
      0,48
      45,48
      55,48
      63,32
      71,66
      79,20
      87,62
      95,40
      103,48
      140,48
    "
    stroke="#1E2A4A"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.15"
  />

  <!-- ===== V.A.P. text ===== -->
  <text
    x="152"
    y="56"
    font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="48"
    fill="#1E2A4A"
    letter-spacing="1"
  >V.A.P.</text>

  <!-- ===== SERVICIOS SANITARIOS tagline ===== -->
  <text
    x="153"
    y="76"
    font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="600"
    font-size="11"
    fill="#9CA3AF"
    letter-spacing="3"
  >SERVICIOS SANITARIOS</text>

  <!-- Small red cross accent after the pulse line -->
  <g transform="translate(122, 34)">
    <rect x="0" y="3.5" width="11" height="4" rx="1" fill="#DC2626"/>
    <rect x="3.5" y="0" width="4" height="11" rx="1" fill="#DC2626"/>
  </g>
</svg>
