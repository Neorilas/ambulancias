<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" fill="none">
  <!--
    Logo V.A.P. Servicios Sanitarios — Compact (Navbar)
    Heartbeat pulse + V.A.P. text only
  -->
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.15"/>
      <stop offset="25%" stop-color="#DC2626" stop-opacity="1"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Heartbeat pulse -->
  <polyline
    points="
      0,26
      28,26
      36,26
      42,16
      48,38
      54,10
      60,36
      66,22
      72,26
      96,26
    "
    stroke="url(#pg)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Shadow -->
  <polyline
    points="
      0,29
      28,29
      36,29
      42,19
      48,41
      54,13
      60,39
      66,25
      72,29
      96,29
    "
    stroke="#1E2A4A"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.12"
  />

  <!-- Red cross accent -->
  <g transform="translate(82, 19)">
    <rect x="0" y="3" width="9" height="3.5" rx="1" fill="#DC2626"/>
    <rect x="2.75" y="0" width="3.5" height="9" rx="1" fill="#DC2626"/>
  </g>

  <!-- V.A.P. text -->
  <text
    x="104"
    y="34"
    font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="32"
    fill="#1E2A4A"
    letter-spacing="1"
  >V.A.P.</text>
</svg>
