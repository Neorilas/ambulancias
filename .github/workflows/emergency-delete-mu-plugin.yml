name: EMERGENCIA - Restaurar lcp-fix.php en mu-plugins

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/emergency-delete-mu-plugin.yml'
  workflow_dispatch:

jobs:
  restore-safe-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Crear version segura del plugin
        run: |
          mkdir -p upload
          printf '<?php\n/**\n * Plugin Name: VAP LCP Fix\n * Description: Mejoras LCP vapss.net\n * Version: 1.3-safe\n */\ndefined("ABSPATH") || exit;\n// En mantenimiento.\n' > upload/lcp-fix.php
          cat upload/lcp-fix.php

      - name: Subir via FTP a mu-plugins
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: upload/
          server-dir: public_html/wp-content/mu-plugins/
          protocol: ftps
          port: 21
          dangerous-clean-slate: false
          timeout: 60000
