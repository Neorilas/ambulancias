name: EMERGENCIA — Restaurar lcp-fix.php en mu-plugins

on:
  workflow_dispatch:

jobs:
  restore-safe-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Crear versión segura del plugin (sin código, solo header)
        run: |
          mkdir -p upload
          cat > upload/lcp-fix.php << 'EOF'
<?php
/**
 * Plugin Name: VAP LCP Fix
 * Description: Mejoras de rendimiento LCP para vapss.net
 * Version:     1.3-safe
 * Author:      VAP
 */
defined('ABSPATH') || exit;
// Plugin temporalmente desactivado para mantenimiento.
EOF

      - name: Subir via FTP a mu-plugins
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: upload/
          server-dir: public_html/wp-content/mu-plugins/
          protocol: ftps
          port: 21
          dangerous-clean-slate: false
          timeout: 60000
